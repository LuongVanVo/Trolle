# 1. Khối này làm nhiệm vụ: Ai vào HTTP thì "đá" sang HTTPS
server {
    listen 80;
    server_name luongvanvo.id.vn www.luongvanvo.id.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name luongvanvo.id.vn www.luongvanvo.id.vn;

    ssl_certificate /etc/letsencrypt/live/luongvanvo.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/luongvanvo.id.vn/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types; 

    location /react-app/ {
        alias /usr/share/nginx/html/react-app/;
        try_files $uri $uri/ /react-app/index.html;
    }

    location /api/ {
        proxy_pass http://backend:5000/; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}