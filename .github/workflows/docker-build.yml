name: Build and Push Frontend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # --- BƯỚC THÊM MỚI: Tạo file .env cho Vite ---
      - name: Create .env file for Vite
        run: |
          echo "VITE_API_BASE_URL=http://159.65.133.191/api" >> .env
          echo "VITE_CLOUDINARY_CLOUD_NAME=dnswn0tfq" >> .env
          echo "VITE_CLOUDINARY_UPLOAD_PRESET=Trolle" >> .env
      # ---------------------------------------------

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/trolle-frontend:latest